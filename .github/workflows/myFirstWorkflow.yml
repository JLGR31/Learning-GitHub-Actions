name: CI Pipeline

# To get a trigger on every push in this repo in any branch
on: 
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Running unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          mkdir reports/
          pytest --html=reports/report.html --self-contained-html --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v
      - name: Upload report artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Tests report
          path: reports/report.html
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: unit-test-report
          path: reports/
  
  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # Required to upload the analysis result
    strategy:
      matrix:
        language: ['python']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name:  Initialize CodeQL
        uses: github/codeql-action/init@v3
        with: 
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download Coverage Report
        uses: actions/download-artifact@v5.0.0
        with:
          name: unit-test-report
          path: reports/
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #- name: SonarQube Quality Gate Check
       # uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        #env: 
         # SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [codeql, sonarqube]
    if: success()
    outputs:
      image-tags: ${{ steps.vars.outputs.IMAGE_TAGS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3.0.0
      - name: Generate Image tags
        id: vars
        run: |
          IMAGE_TAGS="${{ github.run_id }}-${GITHUB_SHA::7}"
          echo "IMAGE_TAGS=$IMAGE_TAGS >> $GITHUB_OUTPUT"
      - name: Build Image (no push)
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: jlgr_app:${{ steps.vars.outputs.IMAGE_TAGS }}
          load: true
      - name: Save Docker Image as artifact
        run: docker save jlgr_app:${{ steps.vars.outputs.IMAGE_TAGS }} -o jlgr_app.tar
      - name: Upload docker Image Artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: jlgr_app_image
          path: jlgr_app.tar

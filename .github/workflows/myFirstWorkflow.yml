name: my-first-workflow

# To get a trigger on every push in this repo in any branch
on: 
  push:

env:
  ENV_TYPE: dev
  APP_USER: JLGR
  APP_PORT: 80

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step-1
        run: |
          pwd
          ls -ltr
          hostname
      - name: Step-2 - Checkout
        uses: actions/checkout@v5.0.0
      - name: Step-3
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostname.txt
      - name: Step-4 Upload Single file
        uses: actions/upload-artifact@v7.0.0
        with:
          name: single_file
          path: ./myartifact.txt
      - name: Step-5 Upload from directory
        uses: actions/upload-artifact@v7.0.0
        with:
          name: directory_artifacts
          path: artifacts/
      - name: Step-6 Upload from multiple paths
        uses: actions/upload-artifact@v7.0.0
        with:
          name: multiple_paths
          path: |
            ./myartifact.txt
            artifacts/
      - name: Step-7 Upload from multiple paths with exclusions
        uses: actions/upload-artifact@v7.0.0
        with:
          name: multiple_paths_with_exclusions
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt
  job2:
    name: JOB2
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Checking current directory
        run: |
          pwd
          ls -ltr
      - name: Download single file artifact
        uses: actions/download-artifact@v7.0.0
        with: 
          name: single_file
      - name: Checking current directory post download
        run: |
          pwd
          ls -ltr
      - name: Referring environments variables
        run: |
          echo "[INFO] Running Deployment for $ENV_TYPE with user $APP_USER."
          echo "[INFO] Application is accesible on port $APP_PORT."

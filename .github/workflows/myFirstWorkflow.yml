name: my-first-workflow

# To get a trigger on every push in this repo in any branch
on: 
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Running unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Setup python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          mkdir reports/
          pytest --html=reports/report.html --self-contained-html --junitxml=reports/unit-test-results.xml --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload report artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Tests report
          path: reports/report.html
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Coverage report
          path: reports/unit-test-results.xml
        
          
